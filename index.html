<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analisador PRO</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 15px;
}

input, textarea {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    border: none;
}

textarea { height: 140px; }

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    margin-top: 15px;
}

.badge {
    display: inline-block;
    background: #22c55e;
    padding: 5px 10px;
    border-radius: 8px;
    margin-top: 5px;
}
</style>
</head>

<body>

<h2>🚀 Analisador PRO</h2>

<input id="cliente" placeholder="Cliente">
<input id="aparelho" placeholder="Aparelho">

<input type="file" accept=".txt,.ips,.panic" onchange="carregarArquivo(event)">

<textarea id="log" placeholder="Cole ou importe o panic log..."></textarea>

<div class="card" id="resultado"></div>
<div class="card" id="relatorio"></div>

<script>
function carregarArquivo(event) {
    const arquivo = event.target.files[0];
    if (!arquivo) return;

    const leitor = new FileReader();
    leitor.onload = function(e) {
        document.getElementById("log").value = e.target.result;
        analisar(); // AUTO ANALISA
    };
    leitor.readAsText(arquivo);
}

document.getElementById("log").addEventListener("input", analisar);

function analisar() {
    let log = document.getElementById("log").value.toLowerCase();

    let resultados = [];

    function add(tipo, desc, score, solucao){
        resultados.push({tipo, desc, score, solucao});
    }

    if (log.includes("baseband") || log.includes("modem"))
        add("BASEBAND", "Falha no modem", 90, "Verificar PMU_RF / linhas");

    if (log.includes("missing sensor"))
        add("SENSOR", "Sensor ausente", 85, "Face ID / câmera");

    if (log.includes("thermal"))
        add("TÉRMICO", "Falha térmica", 80, "Linha NTC");

    if (log.includes("pmic") || log.includes("power"))
        add("ENERGIA", "Falha de energia", 88, "VDD_MAIN / PMIC");

    if (log.includes("nand"))
        add("NAND", "Falha memória", 92, "Regravação");

    if (log.includes("kernel trap"))
        add("CPU", "Falha CPU", 95, "Reballing");

    if (log.includes("watchdog"))
        add("SISTEMA", "Travamento", 70, "iOS ou periférico");

    if (resultados.length === 0){
        document.getElementById("resultado").innerHTML = "❓ Nada identificado";
        return;
    }

    let html = "<b>Diagnósticos:</b><br>";

    resultados.forEach(r => {
        html += `🔹 ${r.tipo} - ${r.desc}<br>
        <span class="badge">Confiança: ${r.score}%</span><br><br>`;
    });

    document.getElementById("resultado").innerHTML = html;

    let cliente = document.getElementById("cliente").value;
    let aparelho = document.getElementById("aparelho").value;

    let rel = `📱 RELATÓRIO PRO\n\nCliente: ${cliente}\nAparelho: ${aparelho}\n\n`;

    resultados.forEach(r => {
        rel += `- ${r.desc} (${r.score}%)\nSolução: ${r.solucao}\n\n`;
    });

    document.getElementById("relatorio").innerText = rel;
}
</script>

</body>
</html>
