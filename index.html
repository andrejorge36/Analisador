<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de Panic Full v2.0</title>
    <style>
        :root { --primary: #0071e3; --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; --danger: #ff3b30; --success: #34c759; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 900px; width: 100%; background: var(--card); padding: 30px; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #drop-zone { border: 2px dashed #ccc; border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        #drop-zone.hover { border-color: var(--primary); background: #f0f7ff; }
        #result { margin-top: 20px; padding: 20px; border-radius: 12px; background: #fff9f9; border: 1px solid #ffebeb; display: none; }
        
        /* Estilo da Tabela de Histórico */
        .history-section { margin-top: 40px; width: 100%; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--primary); color: white; }
        tr:hover { background: #f9f9f9; }
        .btn-clear { background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; float: right; }
    </style>
</head>
<body>

<div class="container">
    <h1>Analisador de Panic Log + Histórico</h1>
    
    <div id="drop-zone">
        Arraste o arquivo .ips/.txt ou clique aqui
        <input type="file" id="file-input" hidden accept=".txt,.ips">
    </div>

    <div id="result">
        <h3 id="diag-res"></h3>
        <p id="diag-detail"></p>
    </div>

    <div class="history-section">
        <button class="btn-clear" onclick="clearHistory()">Limpar Histórico</button>
        <h2>Histórico de Bancada (Banco de Dados)</h2>
        <table id="history-table">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Modelo Detectado</th>
                    <th>Culpado Provável</th>
                    <th>Código</th>
                </tr>
            </thead>
            <tbody id="history-body">
                <!-- Dados entram aqui via JS -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const db = [
        { key: "Prs0", comp: "Flex de Carga (Dock)", detail: "Sensor Barométrico ausente." },
        { key: "Mic1", comp: "Flex de Carga (Dock)", detail: "Microfone Inferior." },
        { key: "Mic2", comp: "Flex Power/Flash", detail: "Microfone Superior." },
        { key: "TG0B", comp: "Bateria", detail: "Erro de dados SWI/BMS." },
        { key: "TG0V", comp: "Bateria", detail: "Erro de voltagem bateria." },
        { key: "Eiger", comp: "Flex de Carga", detail: "Sensor do Dock (iP12+)." }
    ];

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    // Carregar histórico ao abrir
    window.onload = displayHistory;

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    function handleFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => analyze(e.target.result, file.name);
        reader.readAsText(file);
    }

    function analyze(text, filename) {
        let found = null;
        let model = "iPhone " + (text.match(/iPhone\s\d+,?\d+/) || "Não identif.");

        db.forEach(item => {
            if (text.includes(item.key)) found = item;
        });

        if (found) {
            document.getElementById('result').style.display = 'block';
            document.getElementById('diag-res').innerText = "⚠️ Culpado: " + found.comp;
            document.getElementById('diag-detail').innerText = found.detail + " (Código: " + found.key + ")";
            saveToHistory(model, found.comp, found.key);
        } else {
            alert("Nenhum erro conhecido encontrado neste log.");
        }
    }

    function saveToHistory(model, comp, code) {
        let history = JSON.parse(localStorage.getItem('panic_history') || "[]");
        const entry = {
            date: new Date().toLocaleString('pt-BR'),
            model: model,
            comp: comp,
            code: code
        };
        history.unshift(entry); // Adiciona no início
        localStorage.setItem('panic_history', JSON.stringify(history));
        displayHistory();
    }

    function displayHistory() {
        let history = JSON.parse(localStorage.getItem('panic_history') || "[]");
        let html = history.map(h => `
            <tr>
                <td>${h.date}</td>
                <td>${h.model}</td>
                <td>${h.comp}</td>
                <td><strong>${h.code}</strong></td>
            </tr>
        `).join('');
        document.getElementById('history-body').innerHTML = html;
    }

    function clearHistory() {
        if(confirm("Deseja apagar todo o histórico de diagnósticos?")) {
            localStorage.removeItem('panic_history');
            displayHistory();
        }
    }
</script>

</body>
</html>
