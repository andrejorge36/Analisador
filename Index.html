<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analisador</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 15px;
}
input, textarea, button {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}
textarea { height: 130px; }

button {
    background: #22c55e;
    font-weight: bold;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    margin-top: 15px;
}
</style>
</head>

<body>

<h2>🔧 Analisador de Panic Log</h2>

<input id="cliente" placeholder="Nome do cliente">
<input id="aparelho" placeholder="Modelo do aparelho">

<textarea id="log" placeholder="Cole o panic log aqui..."></textarea>

<button onclick="analisar()">🔍 Analisar</button>

<div class="card" id="resultado"></div>
<div class="card" id="relatorio"></div>

<script>
function analisar() {
    let log = document.getElementById("log").value.toLowerCase();

    let resultado = "INDEFINIDO";
    let descricao = "Não identificado";
    let reparo = [];

    if (log.includes("baseband") || log.includes("modem")) {
        resultado = "BASEBAND";
        descricao = "Falha no modem (sem sinal)";
        reparo = ["Verificar PMU_RF", "Linhas do modem", "Possível solda fria"];
    }
    else if (log.includes("missing sensor")) {
        resultado = "SENSOR";
        descricao = "Sensor ausente";
        reparo = ["Testar câmera", "Face ID", "Conector FPC"];
    }
    else if (log.includes("thermal")) {
        resultado = "TÉRMICO";
        descricao = "Falha térmica";
        reparo = ["Verificar NTC", "Linha térmica"];
    }
    else if (log.includes("pmic") || log.includes("power")) {
        resultado = "ENERGIA";
        descricao = "Falha de energia";
        reparo = ["VDD_MAIN", "PMIC", "Curto na placa"];
    }
    else if (log.includes("nand")) {
        resultado = "NAND";
        descricao = "Falha na memória";
        reparo = ["Regravação", "Comunicação CPU"];
    }
    else if (log.includes("kernel trap")) {
        resultado = "CPU";
        descricao = "Falha no processador";
        reparo = ["Alimentação", "Reballing"];
    }
    else if (log.includes("watchdog")) {
        resultado = "SISTEMA";
        descricao = "Travamento do sistema";
        reparo = ["Restaurar iOS", "Testar periféricos"];
    }

    document.getElementById("resultado").innerHTML =
        `<b>Diagnóstico:</b> ${resultado}<br>${descricao}`;

    let cliente = document.getElementById("cliente").value;
    let aparelho = document.getElementById("aparelho").value;

    let texto = `
📱 RELATÓRIO TÉCNICO

Cliente: ${cliente}
Aparelho: ${aparelho}

Diagnóstico: ${descricao}

Possíveis soluções:
- ${reparo.join("\n- ")}

Necessário análise em bancada.
`;

    document.getElementById("relatorio").innerText = texto;
}
</script>

</body>
</html>
